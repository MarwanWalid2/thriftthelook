name: Verify judge-safe demo

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: offline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run pytest api/tests -q
      - run: uv run ruff check api
      - run: uv run mypy api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: corepack pnpm --dir web install --frozen-lockfile --ignore-scripts
      - run: corepack pnpm --dir web lint
      - run: corepack pnpm --dir web build
